<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #faf8ef;
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 80px;
            color: #776e65;
            margin: 0;
        }
        p {
            font-size: 18px;
            color: #776e65;
        }
        .placeholder-game {
            width: 300px;
            height: 300px;
            background: #bbada0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <p>Join the numbers and get to the 2048 tile!</p>
        <div class="placeholder-game">
            [Game Placeholder]
        </div>
        <button onclick="submitScore()" style="margin-top: 20px; padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">
            Submit Score: 2048
        </button>
    </div>

    <script>
        function submitScore() {
            window.parent.postMessage({ type: 'SUBMIT_SCORE', score: 2048 }, '*');
            alert('Score submitted to platform!');
        }
    </script>
</body>
</html>
